  <!-- Person circle (white cutout) — bigger, moved up -->
  <circle cx="100" cy="80" r="24" fill="#ffffff"/>
  <!-- Three text lines (white bars) -->
  <rect x="80" y="124" width="96" height="10" rx="5" fill="#ffffff"/>
  <rect x="80" y="146" width="72" height="10" rx="5" fill="#ffffff"/>
  <rect x="80" y="168" width="84" height="10" rx="5" fill="#ffffff"/>
  <!-- Radar pentagon badge - bottom right -->
  <circle cx="178" cy="206" r="38" fill="#181d26"/>
  <!-- Outer pentagon (white outline) - regular -->
  <polygon points="178,184 198.9,199.2 191,222.8 165,222.8 157.1,199.2" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Asymmetric score polygon (white, filled) - deliberately irregular to look like radar data -->
  <polygon points="178,186 196,201 185,221 167,216 160,199" fill="#ffffff" opacity="0.9" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
