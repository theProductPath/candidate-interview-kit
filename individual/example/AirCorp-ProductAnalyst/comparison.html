const candidates = Array.isArray(appData.candidates) ? appData.candidates.slice() : [];
const radarCandidates = candidates
  .filter((candidate) => Array.isArray(candidate.jdCompetencies) && candidate.jdCompetencies.length > 0)
  .map((candidate, index) => ({
    name: candidate.name,
    color: ["#60a5fa", "#34d399", "#f472b6", "#f59e0b", "#a78bfa", "#fb7185"][index % 6],
    scores: candidate.jdCompetencies.map((entry) => entry.score || 0),
    status: candidate.status
  }));
const radarDims = appData.competencyDimensions || [];
let radarVisible = radarCandidates.map(() => true);
let currentFilter = "all";
let currentSort = { col: "combined", dir: "desc" };

function recommendationRank(label) {
  return {
    "Strong Yes": 5,
    "Yes": 4,
    "Maybe": 3,
    "Pending": 2,
    "Not Started": 1,
    "No": 0
  }[label] ?? -1;
}

function scoreColor(score) {
  if (score === null || score === undefined) return "sc-muted";
  if (score >= 4) return "sc-high";
  if (score >= 3) return "sc-mid";
  return "sc-low";
}

function barColor(score) {
  if (score >= 4) return "var(--green)";
  if (score >= 3) return "var(--yellow)";
  return "var(--danger)";
}

function renderMeta() {
  document.title = appData.title || "Candidate Comparison";
  document.getElementById("subtitle").textContent =
    [appData.role, appData.company].filter(Boolean).join(" | ");
  document.getElementById("meta").innerHTML = [
    appData.hiringManager ? `Hiring Manager: ${escapeHtml(appData.hiringManager)}` : null,
    `Candidates: ${appData.counts.total} (${appData.counts.assessed} assessed, ${appData.counts.pending} pending, ${appData.counts.notStarted} not started)`,
    `Generated: ${formatDate(appData.generatedAt)}`
  ].filter(Boolean).map((item) => `<span>${item}</span>`).join("");
}

function renderFilters() {
  const filters = [
    { key: "all", label: "All" },
    { key: "strong-yes", label: "Strong Yes" },
    { key: "yes", label: "Yes" },
    { key: "maybe", label: "Maybe" },
    { key: "no", label: "No" },
    { key: "pending", label: "Pending" },
    { key: "not-started", label: "Not Started" }
  ];
  const container = document.getElementById("filters");
  container.innerHTML = filters.map((filter) => `
    <button class="filter-btn ${filter.key === currentFilter ? "active" : ""}" data-filter="${filter.key}">
      ${filter.label}
    </button>
  `).join("");
  container.querySelectorAll(".filter-btn").forEach((button) => {
    button.addEventListener("click", () => {
      currentFilter = button.dataset.filter;
      renderFilters();
      renderTable();
      renderCards();
    });
  });
}

function sortCandidates() {
  candidates.sort((left, right) => {
    const col = currentSort.col;
    if (col === "name") {
      return currentSort.dir === "asc"
        ? left.name.localeCompare(right.name)
        : right.name.localeCompare(left.name);
    }
    if (col === "rec") {
      return currentSort.dir === "asc"
        ? recommendationRank(left.rec) - recommendationRank(right.rec)
        : recommendationRank(right.rec) - recommendationRank(left.rec);
    }
    const leftValue = col === "jd" ? left.jdScore : col === "qual" ? left.qualScore : left.combined;
    const rightValue = col === "jd" ? right.jdScore : col === "qual" ? right.qualScore : right.combined;
    if (leftValue === null && rightValue === null) return left.name.localeCompare(right.name);
    if (leftValue === null) return 1;
    if (rightValue === null) return -1;
    return currentSort.dir === "asc" ? leftValue - rightValue : rightValue - leftValue;
  });
}

function filteredCandidates() {
  if (currentFilter === "all") return candidates;
  return candidates.filter((candidate) => candidate.recKey === currentFilter);
}

function renderTable() {
  sortCandidates();
  const tbody = document.getElementById("summaryBody");
  tbody.innerHTML = "";
  filteredCandidates().forEach((candidate) => {
    const radarIndex = getRadarIndexByName(candidate.name);
    const hasRadar = radarIndex !== -1;
    const tr = document.createElement("tr");
    if (hasRadar && radarVisible[radarIndex]) tr.classList.add("is-selected");
    if (!hasRadar) tr.classList.add("is-disabled");
    tr.innerHTML = `
      <td class="candidate-name">${escapeHtml(candidate.name)}</td>
      <td class="score-bar-cell">${renderScoreBar(candidate.jdScore)}</td>
      <td class="score-bar-cell">${renderScoreBar(candidate.qualScore)}</td>
      <td class="score-bar-cell">${renderScoreBar(candidate.combined)}</td>
      <td><span class="rec-badge ${candidate.recClass}">${escapeHtml(candidate.rec)}</span></td>
    `;
    if (hasRadar) {
      tr.addEventListener("click", () => toggleRadarCandidate(radarIndex));
    }
    tbody.appendChild(tr);
  });
}

function renderCards() {
  const container = document.getElementById("cardsContainer");
  container.innerHTML = "";
  filteredCandidates().forEach((candidate, index) => {
    const card = document.createElement("div");
    card.className = "card";
    const previewHtml = `
      <span>JD: <strong class="${scoreColor(candidate.jdScore)}">${formatScore(candidate.jdScore)}</strong></span>
      <span>Qual: <strong class="${scoreColor(candidate.qualScore)}">${formatScore(candidate.qualScore)}</strong></span>
      <span>Combined: <strong class="${scoreColor(candidate.combined)}">${formatScore(candidate.combined)}</strong></span>
    `;
    card.innerHTML = `
      <div class="card-header" data-card-index="${index}">
        <div>
          <h3>${escapeHtml(candidate.name)} <span class="rec-badge ${candidate.recClass}" style="margin-left:0.5rem;font-size:0.7rem;">${escapeHtml(candidate.rec)}</span></h3>
        </div>
        <div style="display:flex;align-items:center;gap:1.5rem;">
          <div class="scores-preview">${previewHtml}</div>
          <span class="toggle" id="toggle-${index}">▾</span>
        </div>
      </div>
      <div class="card-body" id="card-body-${index}">
        ${buildCardBody(candidate)}
      </div>
    `;
    container.appendChild(card);
  });
  container.querySelectorAll(".card-header").forEach((header) => {
    header.addEventListener("click", () => toggleCard(header.dataset.cardIndex));
  });
}

function buildCardBody(candidate) {
  if (candidate.status === "not-started") {
    return `<div class="pending-notice">Candidate folder exists, but no brief has been generated yet.</div>`;
  }
  let html = "";
  if (candidate.snapshot) {
    html += `<div class="card-section"><h4>Snapshot</h4><p>${escapeHtml(candidate.snapshot)}</p></div>`;
  }
  if (candidate.overallImpression) {
    html += `<div class="card-section"><h4>Overall Impression</h4><p>${escapeHtml(candidate.overallImpression)}</p></div>`;
  }
  if (candidate.jdCompetencies.length) {
    html += `<div class="card-section"><h4>JD Competency Scores</h4><div class="score-grid">`;
    candidate.jdCompetencies.forEach((entry) => {
      html += `<div class="score-item"><span class="dim-name">${escapeHtml(entry.dim)}</span><span class="dim-score ${scoreColor(entry.score)}">${formatScore(entry.score)}/5</span></div>`;
    });
    html += `</div></div>`;
  }
  if (candidate.qualDimensions.length) {
    html += `<div class="card-section"><h4>Qualitative Scores</h4><div class="score-grid">`;
    candidate.qualDimensions.forEach((entry) => {
      html += `<div class="score-item"><span class="dim-name">${escapeHtml(entry.dim)}</span><span class="dim-score ${scoreColor(entry.score)}">${formatScore(entry.score)}/5</span></div>`;
    });
    html += `</div></div>`;
  }
  if (candidate.strengths.length) {
    html += `<div class="card-section"><h4>Top Strengths</h4><ul class="evidence-list strengths">`;
    candidate.strengths.slice(0, 3).forEach((item) => {
      html += `<li>${escapeHtml(item)}</li>`;
    });
    html += `</ul></div>`;
  }
  if (candidate.concerns.length) {
    html += `<div class="card-section"><h4>Top Concerns</h4><ul class="evidence-list concerns">`;
    candidate.concerns.slice(0, 2).forEach((item) => {
      html += `<li>${escapeHtml(item)}</li>`;
    });
    html += `</ul></div>`;
  }
  if (candidate.status === "pending") {
    html += `<div class="pending-notice">Brief is ready. Assessment has not been recorded yet.</div>`;
  }
  if (candidate.rationale || candidate.rec) {
    html += `<div class="card-section"><h4>Recommendation</h4><div class="recommendation-box"><span class="rec-badge ${candidate.recClass}">${escapeHtml(candidate.rec)}</span><span class="rationale">${escapeHtml(candidate.rationale || "Assessment not yet complete.")}</span></div></div>`;
  }
  return html;
}

function toggleCard(index) {
  const body = document.getElementById(`card-body-${index}`);
  const toggle = document.getElementById(`toggle-${index}`);
  body.classList.toggle("open");
  toggle.classList.toggle("open");
}

function renderScoreBar(score) {
  if (score === null || score === undefined) {
    return `<span style="color:var(--muted);font-size:0.82rem;">—</span>`;
  }
  const pct = (score / 5) * 100;
  return `<div class="score-bar-wrap">
    <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor(score)}"></div></div>
    <span class="score-bar-label ${scoreColor(score)}">${formatScore(score)}</span>
  </div>`;
}

function getRadarIndexByName(name) {
  return radarCandidates.findIndex((candidate) => candidate.name === name);
}

function toggleRadarCandidate(index) {
  radarVisible[index] = !radarVisible[index];
  renderRadarLegend();
  renderRadar();
  renderSelectionSummary();
  renderTable();
}

function selectAllRadar() {
  radarVisible = radarVisible.map(() => true);
  renderRadarLegend();
  renderRadar();
  renderSelectionSummary();
  renderTable();
}

function renderSelectionSummary() {
  const selected = radarCandidates.filter((candidate, index) => radarVisible[index]).map((candidate) => candidate.name);
  const el = document.getElementById("selectionSummary");
  if (!radarCandidates.length) {
    el.innerHTML = `Radar view will appear once at least one candidate has a completed brief.`;
    return;
  }
  if (selected.length === 0) {
    el.innerHTML = `Radar view showing <strong>no candidates</strong>. Select a row or legend item to compare.`;
    return;
  }
  if (selected.length === radarCandidates.length) {
    el.innerHTML = `Radar view showing <strong>all candidates with JD scores</strong>.`;
    return;
  }
  el.innerHTML = `Radar view showing <strong>${escapeHtml(selected.join(", "))}</strong>.`;
}

function renderRadarLegend() {
  const el = document.getElementById("radarLegend");
  if (!radarCandidates.length) {
    el.innerHTML = "";
    return;
  }
  el.innerHTML = radarCandidates.map((candidate, index) => `
    <div class="radar-legend-item ${radarVisible[index] ? "active" : ""}" data-radar-index="${index}">
      <div class="radar-legend-swatch" style="background:${candidate.color}"></div>
      <span>${escapeHtml(candidate.name)}</span>
      ${candidate.status !== "assessed" ? `<span class="radar-status-tag">${escapeHtml(candidate.status === "pending" ? "Pending" : "In Progress")}</span>` : ""}
    </div>
  `).join("");
  el.querySelectorAll(".radar-legend-item").forEach((item) => {
    item.addEventListener("click", () => toggleRadarCandidate(Number(item.dataset.radarIndex)));
  });
}

function renderRadar() {
  const container = document.getElementById("radarContainer");
  if (!radarCandidates.length || !radarDims.length) {
    container.innerHTML = `<div class="radar-empty">No JD competency data yet. Generate a brief for at least one candidate to populate the radar chart.</div>`;
    return;
  }
  const W = 540;
  const H = 520;
  const cx = W / 2;
  const cy = (H / 2) + 10;
  const maxR = 160;
  const slice = (Math.PI * 2) / radarDims.length;
  const visibleAny = radarVisible.some(Boolean);
  if (!visibleAny) {
    container.innerHTML = `<div class="radar-empty">No candidates selected. Use the table or legend to add polygons back to the chart.</div>`;
    return;
  }

  function pointFor(score, dimIndex) {
    const angle = slice * dimIndex - Math.PI / 2;
    const radius = (score / 5) * maxR;
    return { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  for (let ring = 1; ring <= 5; ring++) {
    const radius = (ring / 5) * maxR;
    let points = "";
    for (let i = 0; i < radarDims.length; i += 1) {
      const angle = slice * i - Math.PI / 2;
      points += `${cx + radius * Math.cos(angle)},${cy + radius * Math.sin(angle)} `;
    }
    svg += `<polygon points="${points}" fill="none" stroke="#2e3848" stroke-width="1"/>`;
    svg += `<text x="${cx + 4}" y="${cy - radius - 5}" font-size="9" fill="#555f70" font-family="Avenir Next, Segoe UI, sans-serif">${ring}</text>`;
  }
  for (let i = 0; i < radarDims.length; i += 1) {
    const angle = slice * i - Math.PI / 2;
    const ex = cx + maxR * Math.cos(angle);
    const ey = cy + maxR * Math.sin(angle);
    svg += `<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#2e3848" stroke-width="1"/>`;
  }
  for (let i = 0; i < radarDims.length; i += 1) {
    const angle = slice * i - Math.PI / 2;
    const labelRadius = maxR + 28;
    const lx = cx + labelRadius * Math.cos(angle);
    const ly = cy + labelRadius * Math.sin(angle);
    const anchor = Math.cos(angle) > 0.3 ? "start" : Math.cos(angle) < -0.3 ? "end" : "middle";
    const lines = wrapLabel(radarDims[i], 20);
    svg += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" font-size="10.5" fill="#8895aa" font-family="Avenir Next, Segoe UI, sans-serif" dominant-baseline="middle">`;
    lines.forEach((line, index) => {
      svg += `<tspan x="${lx}" dy="${index === 0 ? (lines.length > 1 ? -6 : 0) : 13}">${escapeHtml(line)}</tspan>`;
    });
    svg += `</text>`;
  }
  radarCandidates.forEach((candidate, index) => {
    if (!radarVisible[index]) return;
    const points = candidate.scores
      .map((score, dimIndex) => {
        const point = pointFor(score, dimIndex);
        return `${point.x},${point.y}`;
      })
      .join(" ");
    const dashed = candidate.status === "assessed" ? "" : `stroke-dasharray="5,3"`;
    const fillOpacity = candidate.status === "assessed" ? "0.18" : "0.35";
    svg += `<polygon points="${points}" fill="${candidate.color}" fill-opacity="${fillOpacity}" stroke="${candidate.color}" stroke-width="2" ${dashed}/>`;
    candidate.scores.forEach((score, dimIndex) => {
      const point = pointFor(score, dimIndex);
      svg += `<circle cx="${point.x}" cy="${point.y}" r="3.5" fill="${candidate.color}" stroke="#181d26" stroke-width="1.5"/>`;
    });
  });
  svg += `</svg>`;
  container.innerHTML = svg;
}

function wrapLabel(label, maxLen) {
  const words = String(label).split(" ");
  const lines = [];
  let current = "";
  words.forEach((word) => {
    const candidate = current ? `${current} ${word}` : word;
    if (candidate.length > maxLen && current) {
      lines.push(current);
      current = word;
    } else {
      current = candidate;
    }
  });
  if (current) lines.push(current);
  return lines;
}

function formatDate(value) {
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? value : date.toISOString().slice(0, 10);
}

function formatScore(value) {
  if (value === null || value === undefined) return "—";
  return Number(value).toFixed(1).replace(/\.0$/, "");
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

document.querySelectorAll(".summary-table thead th").forEach((header) => {
  header.addEventListener("click", () => {
    const col = header.dataset.col;
    let dir = "desc";
    if (currentSort.col === col && currentSort.dir === "desc") dir = "asc";
    currentSort = { col, dir };
    document.querySelectorAll(".summary-table thead th").forEach((th) => {
      th.classList.remove("sorted");
      const arrow = th.querySelector(".sort-arrow");
      if (arrow) arrow.textContent = "▾";
    });
    header.classList.add("sorted");
    header.querySelector(".sort-arrow").textContent = dir === "desc" ? "▾" : "▴";
    renderTable();
    renderCards();
  });
});

document.getElementById("selectAllButton").addEventListener("click", selectAllRadar);

renderMeta();
renderFilters();
renderTable();
renderCards();
renderRadarLegend();
renderRadar();
renderSelectionSummary();
</script>
</body>
</html>
